name: uzapoint_mobile
description: UzaPoint mobile POS — iOS 26-inspired UI with shared web palette.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  go_router: ^14.6.2
  google_fonts: ^6.3.1
  lucide_icons: ^0.257.0
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  mobile_scanner: ^6.0.2
  connectivity_plus: ^6.1.4
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/uzapoint_tokens.json
    - assets/images/shop_entrepreneur.png
    - assets/images/google_logo.png
    - assets/images/apple_logo.png
